<!--
  Referencia: cómo puede verse un aviso de contacto en HTML (tablas + estilos inline).
  FormSubmit en plan gratuito usa plantillas internas (basic | table | box); este archivo
  sirve si más adelante envías correo con otro servicio (Resend, SES, etc.).
-->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mensaje — Portafolio</title>
  </head>
  <body style="margin: 0; padding: 24px; background-color: #0b1326; font-family: Inter, Segoe UI, system-ui, sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width: 560px; margin: 0 auto; background-color: #171f33; border-radius: 16px; overflow: hidden; border: 1px solid #2d3449;">
      <tr>
        <td style="padding: 28px 28px 8px 28px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.35), transparent 55%);">
          <p style="margin: 0; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #c0c1ff; font-weight: 600;">Portafolio</p>
          <h1 style="margin: 12px 0 0 0; font-size: 22px; font-weight: 600; color: #dae2fd; font-family: 'Space Grotesk', Inter, sans-serif;">Nuevo mensaje de contacto</h1>
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 28px 28px 28px;">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse;">
            <tr>
              <td style="padding: 12px 0; border-bottom: 1px solid #2d3449; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: #89ceff; width: 120px;">Nombre</td>
              <td style="padding: 12px 0; border-bottom: 1px solid #2d3449; font-size: 15px; color: #dae2fd;">{{name}}</td>
            </tr>
            <tr>
              <td style="padding: 12px 0; border-bottom: 1px solid #2d3449; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: #89ceff;">Correo</td>
              <td style="padding: 12px 0; border-bottom: 1px solid #2d3449; font-size: 15px;">
                <a href="mailto:{{email}}" style="color: #6366f1; text-decoration: none; font-weight: 600;">{{email}}</a>
              </td>
            </tr>
            <tr>
              <td style="padding: 12px 0; border-bottom: 1px solid #2d3449; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: #89ceff;">Asunto</td>
              <td style="padding: 12px 0; border-bottom: 1px solid #2d3449; font-size: 15px; color: #dae2fd;">{{subject}}</td>
            </tr>
            <tr>
              <td colspan="2" style="padding: 20px 0 8px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: #89ceff;">Mensaje</td>
            </tr>
            <tr>
              <td colspan="2" style="padding: 0 0 8px 0; font-size: 15px; line-height: 1.6; color: #c7c4d7; white-space: pre-wrap;">{{message}}</td>
            </tr>
          </table>
          <p style="margin: 24px 0 0 0; font-size: 12px; color: #908fa0;">Responde con «Responder» para escribir directamente al visitante.</p>
        </td>
      </tr>
    </table>
  </body>
</html>
